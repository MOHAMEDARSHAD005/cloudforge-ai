name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api-nest/prisma/schema.prisma

      - name: Build Monorepo Packages
        run: npm run build

      - name: Run Lint
        run: npm run lint

      - name: Run Type Check
        run: npm run type-check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/ai-fastapi/requirements.txt'

      - name: Install Python dependencies
        run: |
          pip install -r apps/ai-fastapi/requirements.txt
          pip install flake8 || true

      - name: Lint Python Code
        run: |
          flake8 apps/ai-fastapi --count --select=E9,F63,F7,F82 --show-source --statistics || true
